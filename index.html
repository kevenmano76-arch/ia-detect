<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: black; display: flex; flex-direction: column; align-items: center; }
        /* Forçamos o vídeo a ocupar a tela inteira */
        #webcam { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: block; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .controls { position: fixed; bottom: 20px; z-index: 10; display: flex; gap: 10px; }
        button { padding: 15px 25px; font-size: 18px; border-radius: 10px; border: none; background: #00FF00; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output"></canvas>
    <div class="controls">
        <button onclick="iniciarCamera('user')">Frontal</button>
        <button onclick="iniciarCamera('environment')">Traseira</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});

        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
        pose.onResults(results => {
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (results.poseLandmarks) {
                drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                const xs = results.poseLandmarks.map(p => p.x * canvas.width);
                const ys = results.poseLandmarks.map(p => p.y * canvas.height);
                ctx.strokeStyle = '#00FF00';
                ctx.strokeRect(Math.min(...xs)-30, Math.min(...ys)-30, (Math.max(...xs)-Math.min(...xs))+60, (Math.max(...ys)-Math.min(...ys))+60);
            }
        });

        async function iniciarCamera(modo) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: modo } });
                video.srcObject = stream;
                video.play();
                async function frame() {
                    if (video.readyState >= 2) await pose.send({image: video});
                    requestAnimationFrame(frame);
                }
                frame();
            } catch (e) { alert("Erro de acesso à câmera: " + e); }
        }
    </script>
</body>
</html>
