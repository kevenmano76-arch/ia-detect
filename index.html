<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: black; display: flex; flex-direction: column; align-items: center; }
        #webcam { display: block; width: 100%; height: auto; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .controls { position: absolute; bottom: 20px; z-index: 10; display: flex; gap: 10px; }
        button { padding: 15px; font-size: 16px; border-radius: 10px; border: none; background: #00FF00; cursor: pointer; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output"></canvas>
    <div class="controls">
        <button onclick="iniciarCamera('user')">Câmera Frontal</button>
        <button onclick="iniciarCamera('environment')">Câmera Traseira</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});

        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
        pose.onResults(onResults);

        async function iniciarCamera(modo) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: modo } });
                video.srcObject = stream;
                
                // Aguarda o vídeo carregar os dados
                video.onloadedmetadata = () => {
                    video.play();
                    loop();
                };
            } catch (err) { alert("Erro na câmera: " + err); }
        }

        async function loop() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                await pose.send({image: video});
            }
            requestAnimationFrame(loop);
        }

        function onResults(results) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (results.poseLandmarks) {
                drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                const xs = results.poseLandmarks.map(p => p.x * canvas.width);
                const ys = results.poseLandmarks.map(p => p.y * canvas.height);
                const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
                ctx.strokeStyle = '#00FF00';
                ctx.strokeRect(minX - 20, minY - 20, (maxX - minX) + 40, (maxY - minY) + 40);
                ctx.fillStyle = '#00FF00';
                ctx.fillText("ALVO DETECTADO", minX, minY - 10);
            }
        }
    </script>
</body>
</html>
