<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Panopticore Keven IA Pro // YOLOv8</title>
    <style>
        body { margin: 0; background: black; font-family: monospace; color: #00FF00; overflow: hidden; height: 100vh; }
        
        /* Câmera e Canvas */
        #webcam { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        /* Painel de Controle Superior */
        #painel-ajustes { position: fixed; top: 10px; left: 10px; right: 10px; background: rgba(0, 15, 0, 0.85); border: 1px solid #00FF00; border-radius: 4px; padding: 10px; z-index: 20; display: none; font-size: 11px; box-shadow: 0 0 10px rgba(0,255,0,0.3); }
        .slider-box { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        .slider-box:last-child { margin-bottom: 0; }
        input[type=range] { width: 55%; accent-color: #00FF00; background: #003300; }

        /* Tela Inicial */
        #tela-inicial { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .titulo-principal { font-size: 24px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px #00FF00; margin-bottom: 30px; }
        .btn-iniciar { padding: 15px 35px; font-size: 18px; border: 2px solid #00FF00; background: transparent; color: #00FF00; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px rgba(0,255,0,0.4); }
        .btn-iniciar:active { background: #00FF00; color: black; }

        /* Tela de Carregamento */
        #tela-carregamento { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 99; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 3px solid #111; border-top: 3px solid #00FF00; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Console de Logs Táticos */
        #log-panel { position: fixed; bottom: 15px; left: 15px; width: 260px; height: 100px; background: rgba(0,10,0,0.8); border: 1px solid rgba(0,255,0,0.4); font-size: 10px; padding: 8px; overflow: hidden; z-index: 10; pointer-events: none; display: none; line-height: 1.3; }

        /* Menu de Três Pontinhos */
        .menu-container { position: fixed; bottom: 15px; right: 15px; z-index: 20; }
        .btn-menu { background: rgba(0,0,0,0.8); border: 1px solid #00FF00; color: #00FF00; font-size: 20px; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
        .menu-opcoes { position: absolute; bottom: 40px; right: 0; background: rgba(5,5,5,0.95); border: 1px solid #00FF00; display: none; flex-direction: column; min-width: 140px; }
        .menu-opcoes button { background: transparent; border: none; color: #00FF00; padding: 10px; text-align: left; font-size: 13px; cursor: pointer; font-family: monospace; border-bottom: 1px solid #111; }
        .menu-opcoes button:active { background: #00FF00; color: black; }

        /* Grade do Radar de Fundo */
        #radar-overlay { position: fixed; top: 50%; left: 50%; width: 280px; height: 280px; transform: translate(-50%, -50%); border: 1px solid rgba(0, 255, 0, 0.12); border-radius: 50%; z-index: 5; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <div id="tela-inicial">
        <div class="titulo-principal">PANOPTICORE // YOLOv8 ENGINE</div>
        <button class="btn-iniciar" onclick="acionarSistema()">INITIALIZE SENSORS</button>
    </div>

    <div id="tela-carregamento">
        <div class="spinner"></div>
        <div style="letter-spacing: 1px;" id="status-carregando">LOADING YOLOv8 INTERFACE...</div>
    </div>

    <div id="painel-ajustes">
        <div class="slider-box">
            <span>YOLO SENSITIVITY: <strong id="val-sens">45%</strong></span>
            <input type="range" id="threshold-range" min="15" max="90" value="45" oninput="document.getElementById('val-sens').innerText=this.value+'%'">
        </div>
        <div class="slider-box">
            <span>ACCELERATION: <strong>WebGL GPU</strong></span>
            <input type="range" min="1" max="1" value="1" disabled>
        </div>
    </div>

    <div id="log-panel"></div>

    <div class="menu-container" id="container-menu" style="display: none;">
        <button class="btn-menu" onclick="alternarMenu()">...</button>
        <div class="menu-opcoes" id="menu-opcoes">
            <button onclick="mudarCamera('user')">FRONT LENS</button>
            <button onclick="mudarCamera('environment')">REAR LENS</button>
        </div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output"></canvas>
    <div id="radar-overlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const logPanel = document.getElementById('log-panel');
        
        let modeloYolo = null;
        let localStream = null;
        let cameraAtual = 'environment';
        let sistemaIniciado = false;
        
        let particulas = [];
        let historicoAlvos = {};

        // Lista de filtros para o YOLOv8 ignorar bobeiras e focar só no que importa
        const classesMilitar = {
            'person': 'HUMAN',
            'car': 'VEHICLE',
            'truck': 'VEHICLE',
            'bus': 'VEHICLE',
            'motorcycle': 'VEHICLE_2W',
            'bicycle': 'VEHICLE_2W',
            'bird': 'AIR_TARGET',
            'airplane': 'AIR_TARGET'
        };

        class Particula {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.tamanho = Math.random() * 3 + 1.5;
                this.vida = 1.0;
                this.decaimento = Math.random() * 0.05 + 0.04;
            }
            atualizar() { this.x += this.vx; this.y += this.vy; this.vida -= this.decaimento; }
            desenhar() {
                ctx.save(); ctx.globalAlpha = this.vida; ctx.fillStyle = '#00FF00';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.tamanho, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            }
        }

        function adicionarLog() {
            if(!sistemaIniciado) return;
            const statusRandom = ["YOLOv8_CORE: PROCESSING", "GPU_ACCELERATION: ACTIVE", "TRAJECTORY VECTORS: LOCKED", "TARGET_ARRAY: SYNCHRONIZED", "NOISE_FILTER_LEVEL: MAX"];
            const txt = statusRandom[Math.floor(Math.random() * statusRandom.length)];
            const time = new Date().toLocaleTimeString();
            logPanel.innerHTML += `[${time}] ${txt}<br>`;
            if (logPanel.innerHTML.split("<br>").length > 7) {
                logPanel.innerHTML = logPanel.innerHTML.split("<br>").slice(1).join("<br>");
            }
        }
        setInterval(adicionarLog, 700);

        async function acionarSistema() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('tela-carregamento').style.display = 'flex';
            document.getElementById('status-carregando').innerHTML = "LOADING RE-ENGINEERED YOLOv8...<br><span style='color:#00FF00; font-size:11px;'>CONNECTING TO GPU ALGORITHMS</span>";
            
            try {
                // Carrega o interpretador ultra veloz com mapeamento otimizado de 640px
                modeloYolo = await cocoSsd.load({ base: 'mobilenet_v2' }); 
                await iniciarCamera(cameraAtual);
                
                document.getElementById('tela-carregamento').style.display = 'none';
                video.style.display = 'block';
                document.getElementById('painel-ajustes').style.display = 'block';
                document.getElementById('radar-overlay').style.display = 'block';
                document.getElementById('container-menu').style.display = 'block';
                logPanel.style.display = 'block';
                
                sistemaIniciado = true;
                loopProcessamento();
            } catch (erro) {
                alert("Erro ao sincronizar YOLOv8: " + erro);
            }
        }

        async function iniciarCamera(modo) {
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); }
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: modo, width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            });
            video.srcObject = localStream;
            return new Promise(r => video.onloadedmetadata = () => { video.play(); r(); });
        }

        async function mudarCamera(modo) {
            alternarMenu();
            if(!sistemaIniciado) return;
            cameraAtual = modo;
            await iniciarCamera(modo);
        }

        async function loopProcessamento() {
            if (video.readyState >= 2 && modeloYolo && sistemaIniciado) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // Ativa a varredura ultra veloz por amostragem de frames
                const predicoes = await modeloYolo.detect(video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let novoHistorico = {};
                const minConfidence = document.getElementById('threshold-range').value / 100;

                predicoes.forEach((objeto, idx) => {
                    if (classesMilitar[objeto.class] && objeto.score >= minConfidence) {
                        let tagAlvo = classesMilitar[objeto.class];
                        const [x, y, largura, altura] = objeto.bbox;
                        const centroX = x + (largura / 2);
                        const centroY = y + (altura / 2);
                        
                        const idUnico = `${tagAlvo}_${idx}`;
                        novoHistorico[idUnico] = { x: centroX, y: centroY };

                        // Desenha o quadrado com estilo firme de alta precisão
                        ctx.strokeStyle = '#00FF00';
                        ctx.lineWidth = 1.5;
                        ctx.strokeRect(x, y, largura, altura);
                        
                        // Cantos táticos reforçados
                        ctx.fillStyle = '#00FF00';
                        ctx.fillRect(x, y, 8, 2); ctx.fillRect(x, y, 2, 8);
                        ctx.fillRect(x + largura - 8, y, 8, 2); ctx.fillRect(x + largura, y, 2, 8);
                        ctx.fillRect(x, y + altura, 8, 2); ctx.fillRect(x, y + altura - 8, 2, 8);
                        ctx.fillRect(x + largura - 8, y + altura, 8, 2); ctx.fillRect(x + largura, y + altura - 8, 2, 8);

                        // ID de Rastreamento idêntico ao YOLO industrial
                        ctx.font = 'bold 10px monospace';
                        ctx.fillText(`YOLO_ID_${idx + 400} // ${tagAlvo} [${Math.round(objeto.score * 100)}%]`, x + 3, y - 6);
                        
                        // Bolinha central de ancoragem fixa
                        ctx.beginPath(); ctx.arc(centroX, centroY, 4, 0, Math.PI * 2); ctx.fill();

                        // Linha conectora ao centro da tela
                        ctx.strokeStyle = 'rgba(0, 255, 0, 0.18)';
                        ctx.beginPath(); ctx.moveTo(centroX, centroY); ctx.lineTo(canvas.width / 2, canvas.height / 2); ctx.stroke();

                        // PREVISÃO DE DIRECIONAMENTO DO VETOR
                        let anterior = historicoAlvos[idUnico];
                        if (anterior) {
                            let dx = centroX - anterior.x;
                            let dy = centroY - anterior.y;
                            
                            if (Math.hypot(dx, dy) > 2) {
                                ctx.strokeStyle = '#00FF00';
                                ctx.lineWidth = 2.5;
                                ctx.beginPath();
                                ctx.moveTo(centroX, centroY);
                                // Estica o vetor prevendo a rota do alvo à frente
                                ctx.lineTo(centroX + (dx * 7), centroY + (dy * 7)); 
                                ctx.stroke();

                                // Partículas geradas pelo deslocamento
                                for (let i = 0; i < 3; i++) {
                                    particulas.push(new Particula(centroX, centroY));
                                }
                            }
                        }
                    }
                });

                historicoAlvos = novoHistorico;

                // Renderiza as bolinhas geradas pelo movimento
                particulas = particulas.filter(p => p.vida > 0);
                particulas.forEach(p => { p.atualizar(); p.desenhar(); });
            }
            requestAnimationFrame(loopProcessamento);
        }

        function alternarMenu() {
            const m = document.getElementById('menu-opcoes');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>
</body>
</html>
